<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><h1>RRB Section Controller Result</h1></title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
}

.container {
  max-width: 420px;
  margin: 60px auto;
  background: #fff;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: #666;
  margin-bottom: 25px;
}

.input-group {
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #5a5af7, #7a5af8);
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.9;
}

.result {
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h1>RRB NTPC Result Checker</h1>
  <div class="subtitle">Check your CBT-1 Qualification Status</div>

  <div class="input-group">
    <input type="text" id="name" placeholder="Enter your full name">
  </div>

  <div class="input-group">
    <input type="text" id="mobile" placeholder="10-digit mobile number">
  </div>

  <div class="input-group">
    <select id="zone">
      <option value="">Select your RRB zone</option>
      <option>Patna</option>
      <option>Allahabad</option>
      <option>Mumbai</option>
      <option>Kolkata</option>
      <option>Chennai</option>
    </select>
  </div>

  <div class="input-group">
    <input type="text" id="roll" placeholder="Enter your 16-digit roll number">
  </div>

  <button onclick="checkResult()">Check Qualification Status</button>

  <div class="result" id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
