<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRB Section Controller Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background: #fff;
  width: 100%;
  max-width: 420px;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  color: #333;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: #777;
  margin-bottom: 25px;
}

input, select {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #667eea, #764ba2);
  color: white;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.result {
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
}

.success {
  color: #16a34a;
}

.fail {
  color: #dc2626;
}
</style>
</head>

<body>

<div class="container">

  <h1>RRB Section Controller Result</h1>
  <div class="subtitle">Check your CBT-1 Qualification Status</div>

  <input type="text" id="name" placeholder="Enter your full name">
  <input type="text" id="mobile" placeholder="10-digit mobile number">

  <select id="zone">
    <option value="">Select your RRB zone</option>
    <option>RRB Ahmedabad</option>
    <option>RRB Ajmer</option>
    <option>RRB Allahabad</option>
    <option>RRB Bangalore</option>
    <option>RRB Bhopal</option>
    <option>RRB Bhubaneswar</option>
    <option>RRB Bilaspur</option>
    <option>RRB Chandigarh</option>
    <option>RRB Chennai</option>
    <option>RRB Gorakhpur</option>
    <option>RRB Guwahati</option>
    <option>RRB Jammu-Srinagar</option>
    <option>RRB Kolkata</option>
    <option>RRB Malda</option>
    <option>RRB Mumbai</option>
    <option>RRB Muzaffarpur</option>
    <option>RRB Patna</option>
    <option>RRB Ranchi</option>
    <option>RRB Secunderabad</option>
    <option>RRB Siliguri</option>
    <option>RRB Thiruvananthapuram</option>
  </select>

  <input type="text" id="roll" placeholder="Enter your 16-digit roll number">

  <button onclick="checkResult()">Check Qualification Status</button>

  <div class="result" id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
